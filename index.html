<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Catálogo | Urutau Jigs</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body>

  <header class="top">
    <img src="img/WhatsApp Image 2026-02-25 at 21.50.21.jpeg" alt="Urutau JDS" class="logo">
    <div class="top-text">
      <h1>Catálogo | Urutau Jigs
      </h1>
      <p>Escolha o modelo, a cor e a quantidade</p>
    </div>
  </header>

  <main class="container">
    <section id="grid" class="grid"></section>

    <section class="carrinho">
      <h2>Seu Pedido <span id="totalUnidades">(0)</span></h2>
      <div id="listaCarrinho"></div>

      <button id="finalizar" class="btn" disabled>
        Finalizar no WhatsApp (0 itens)
      </button>
    </section>
  </main>

  <footer class="footer">
    <small>© Urutau Jigs</small>
  </footer>

  <div id="toast"></div>
  <div id="undo-message" class="undo-message">
    Item removido 🗑️
    <button id="undo-btn">Desfazer</button>
  </div>
  <script src="script.js"></script>
</body>

</html>
